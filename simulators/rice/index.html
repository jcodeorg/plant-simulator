<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水稲栽培シミュレーター（ハードモード・異常気象対応）</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f0f4f8; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2, h3 { color: #2c3e50; margin-top: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .panel { padding: 15px; border-radius: 8px; border: 1px solid #ccc; background: #fafafa; }
        .status-header { background: #e3f2fd; border-left: 5px solid #2196f3; padding: 15px; margin-bottom: 20px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .stage-badge { background: #ff9800; color: #fff; padding: 5px 10px; border-radius: 5px; font-size: 16px; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .action-check { display: none; }
        .action-label { display: block; text-align: center; background: #e0e0e0; padding: 10px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; border: 2px solid transparent; }
        .action-label:hover { background: #d5d5d5; }
        .action-check:checked + .action-label { background: #e8f5e9; border-color: #4caf50; color: #2e7d32; box-shadow: 0 0 5px rgba(76, 175, 80, 0.5); }
        
        .btn { border: none; padding: 12px; font-size: 15px; border-radius: 5px; cursor: pointer; width: 100%; margin-bottom: 5px; font-weight: bold; transition: 0.2s; }
        .btn-skip { background: #ff9800; color: white; font-size: 16px; padding: 15px; }
        .btn-skip:hover { background: #fb8c00; }
        .btn-advance { background: #4caf50; color: white; }
        .btn-advance:hover { background: #388e3c; }
        
        .alert { color: #d32f2f; font-weight: bold; }
        .warning-box { background: #ffebee; border: 1px solid #ef9a9a; padding: 10px; border-radius: 5px; margin-bottom: 10px; display: none; font-weight: bold; color: #c62828;}
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: left; }
        th { background-color: #f2f2f2; position: sticky; top: 0; z-index: 10; }
        .history-container { max-height: 250px; overflow-y: auto; border: 1px solid #ccc; }
        .chart-container { position: relative; height: 350px; width: 100%; margin-bottom: 20px; }
        
        .monitor { width: 100%; height: 200px; background: #87CEEB; border-radius: 8px; position: relative; overflow: hidden; border: 3px solid #333; margin-bottom: 15px; }
        .monitor-sun { position: absolute; top: 10px; right: 10px; font-size: 40px; transition: 0.5s; }
        .monitor-plant { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); font-size: 20px; transition: 0.5s; text-align: center; z-index: 3; }
        .monitor-water { position: absolute; bottom: 30px; left: 0; width: 100%; background: rgba(33, 150, 243, 0.6); transition: height 0.3s; z-index: 2; }
        .monitor-soil { position: absolute; bottom: 0; left: 0; width: 100%; height: 30px; background: #795548; z-index: 1; }
        .sick-plant { filter: sepia(1) hue-rotate(-50deg) saturate(2); }
        .abnormal-banner { background: #d32f2f; color: white; text-align: center; padding: 10px; border-radius: 5px; margin-bottom: 15px; display: none; font-weight: bold; font-size: 16px;}
    </style>
</head>
<body>

<div class="container">
    <h1>🌾 水稲栽培シミュレーター</h1>
    
    <div id="setupScreen" class="panel">
        <h2>栽培の準備</h2>
        <div class="grid">
            <div>
                <label>📍 栽培地域の選択:</label>
                <select id="regionSelect" style="width:100%; padding:8px; margin-top:5px; font-size:16px;">
                    <option value="hokkaido">北海道</option>
                    <option value="tohoku">東北</option>
                    <option value="kanto" selected>関東</option>
                    <option value="kansai">関西・四国</option>
                    <option value="kyushu">九州</option>
                    <option value="okinawa">沖縄</option>
                </select>
            </div>
            <div>
                <label>🌱 品種の選択:</label>
                <select id="varietySelect" style="width:100%; padding:8px; margin-top:5px; font-size:16px;">
                    <option value="normal" selected>コシヒカリ型</option>
                    <option value="resistant">耐病性品種</option>
                    <option value="high_yield">多収穫品種</option>
                    <option value="early">早生品種</option>
                </select>
            </div>
        </div>
        <button class="btn btn-skip" style="margin-top: 20px;" onclick="startGame()">この設定で栽培を開始する</button>
    </div>

    <div id="mainScreen" style="display: none;">
        
        <div id="abnormalBanner" class="abnormal-banner"></div>

        <div class="status-header">
            <div>経過日数: <span id="dayDisplay">1</span> 日目 (全 <span id="maxDaysDisplay">150</span> 日)</div>
            <div><span class="stage-badge" id="stageDisplay">田植え・活着期</span></div>
        </div>

        <div class="grid" id="controlPanel">
            <div class="panel">
                <h3>リアルタイム・モニター</h3>
                <div class="monitor">
                    <div class="monitor-sun" id="visSun">☀️</div>
                    <div class="monitor-water" id="visWater" style="height: 15px;"></div>
                    <div class="monitor-plant" id="visPlant">🌱</div>
                    <div class="monitor-soil"></div>
                </div>

                <p>🌡 気温: <span id="tempDisplay">--</span> ℃ <span id="weatherAlert" class="alert"></span></p>
                <hr>
                <div class="warning-box" id="diseaseAlert">⚠️ いもち病 発生中！</div>
                <div class="warning-box" id="pestAlert">⚠️ 害虫発生中！: <span id="pestListDisplay"></span></div>
                <p>🌱 草丈: <span id="heightDisplay">10</span> cm</p>
                <p>🌿 雑草: <span id="weedDisplay">0</span> / 10</p>
                <p>🌾 予想収量: <span id="yieldDisplay">600</span> kg/10a</p>
            </div>

            <div class="panel">
                <h3>🛠 次の期間に向けた管理設定</h3>
                
                <div style="margin-bottom: 15px; margin-top: 15px;">
                    <label>💧 水深の指示: <span id="waterVal" style="font-weight:bold; color:#2196f3; font-size:18px;">3</span> cm</label>
                    <input type="range" id="waterInput" min="0" max="10" value="3" oninput="updateWaterVisual()" style="width: 100%;">
                </div>
                
                <p style="margin-bottom: 5px; font-weight: bold;">実施する作業を選択（複数可）:</p>
                <div class="action-grid" style="margin-bottom: 20px;">
                    <div><input type="checkbox" id="chk-fert" class="action-check" value="fertilizer"><label for="chk-fert" class="action-label">🧪 追肥</label></div>
                    <div><input type="checkbox" id="chk-weed1" class="action-check" value="weed_manual"><label for="chk-weed1" class="action-label">✋ 手取り除草</label></div>
                    <div><input type="checkbox" id="chk-weed2" class="action-check" value="herbicide"><label for="chk-weed2" class="action-label">☠️ 除草剤</label></div>
                    <div><input type="checkbox" id="chk-fung" class="action-check" value="fungicide"><label for="chk-fung" class="action-label">💊 殺菌剤</label></div>
                    <div><input type="checkbox" id="chk-pest" class="action-check" value="pesticide"><label for="chk-pest" class="action-label">🐛 殺虫剤</label></div>
                </div>
                
                <hr>
                <p style="text-align:center; margin:5px 0;">上記の作業を行いつつ時間を進めます</p>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-advance" style="flex:1;" onclick="processTurn(1)">▶ 1日進める</button>
                    <button class="btn btn-skip" style="flex:2;" onclick="processTurn(7)">⏭ 7日進める</button>
                </div>
            </div>
        </div>

        <div class="panel">
            <h3>📈 生育と気象の推移</h3>
            <div class="chart-container">
                <canvas id="growthChart"></canvas>
            </div>
        </div>

        <div class="panel">
            <h3>📋 栽培履歴 (ログ)</h3>
            <div class="history-container">
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th width="8%">日</th>
                            <th width="12%">ステージ</th>
                            <th width="12%">気温/天気</th>
                            <th width="8%">水深</th>
                            <th width="8%">草丈</th>
                            <th width="20%">実施作業</th>
                            <th width="32%">発生した出来事</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>

    </div>
</div>

<script>
    let TOTAL_DAYS = 150;
    let currentDay = 1;
    let height = 10;
    let potentialYield = 600;
    let weedLevel = 0;
    let diseaseActive = false;
    let activePests = []; 
    let costPoints = 0;
    let region = "";
    let variety = "";

    // 異常気象・温度障害関連の変数
    let climateType = "normal"; // normal, mega_hot, extreme_cold
    let coldDays = 0;
    let hotDays = 0;
    let abnormalTendencyDays = 0; // 異常気温が連鎖する残り日数
    let abnormalTendencyDir = ""; // "hot" or "cold"
    
    let dryDays = 0;
    let cumulativeSunlight = 0;

    const monthlyTemps = {
        hokkaido: [13.0, 17.0, 21.1, 22.3, 18.6],
        tohoku: [15.4, 19.3, 23.2, 24.9, 21.4],
        kanto: [19.8, 22.4, 26.3, 27.8, 24.2],
        kansai: [20.1, 23.9, 27.9, 29.3, 25.5],
        kyushu: [20.2, 23.6, 27.7, 28.7, 25.1],
        okinawa: [24.3, 27.1, 29.1, 29.0, 27.9]
    };

    let chartLabels = [1];
    let chartHeightData = [10];
    let chartYieldData = [600];
    let chartSunlightData = [10];
    let chartInstance = null;

    function startGame() {
        region = document.getElementById('regionSelect').value;
        variety = document.getElementById('varietySelect').value;
        
        if (variety === "early") TOTAL_DAYS = 120;
        if (variety === "high_yield") potentialYield = 750;
        
        document.getElementById('maxDaysDisplay').innerText = TOTAL_DAYS;
        chartYieldData[0] = potentialYield;

        // 異常気象の判定（20%の確率）
        let climateRoll = Math.random();
        const banner = document.getElementById('abnormalBanner');
        if (climateRoll < 0.1) {
            climateType = "mega_hot";
            banner.innerText = "⚠️ 【気象庁警報】今年は記録的な「猛暑年」になる予報です。極端な高温と水枯れに警戒してください。";
            banner.style.display = "block";
            alert(banner.innerText);
        } else if (climateRoll < 0.2) {
            climateType = "extreme_cold";
            banner.innerText = "⚠️ 【気象庁警報】今年は記録的な「大冷夏」になる予報です。地域を問わず深刻な低温障害に警戒してください。";
            banner.style.display = "block";
            banner.style.backgroundColor = "#1976d2"; // 青系に変更
            alert(banner.innerText);
        }

        document.getElementById('setupScreen').style.display = 'none';
        document.getElementById('mainScreen').style.display = 'block';
        
        initChart();
        updateUI();
        updateWaterVisual();
        logHistory("開始", "田植え", "-", "-", "10cm", "-", "栽培を開始しました");
    }

    function getStageInfo(day) {
        let ratio = day / TOTAL_DAYS;
        if (ratio <= 0.15) return "田植え・活着期";
        if (ratio <= 0.40) return "分げつ期";
        if (ratio <= 0.50) return "中干し期";
        if (ratio <= 0.70) return "穂ばらみ・出穂期";
        if (ratio <= 0.95) return "登熟期";
        return "落水・収穫期";
    }

    function updateWaterVisual() {
        const val = document.getElementById('waterInput').value;
        document.getElementById('waterVal').innerText = val;
        document.getElementById('visWater').style.height = (val * 4) + 'px';
    }

    function getBaseTemp(day, regionCode) {
        const temps = monthlyTemps[regionCode];
        const monthLength = 30;
        let monthIndex = Math.floor((day - 1) / monthLength);
        if (monthIndex >= 4) return temps[4];
        let progress = ((day - 1) % monthLength) / monthLength;
        return temps[monthIndex] * (1 - progress) + temps[monthIndex + 1] * progress;
    }

    function processTurn(daysToAdvance) {
        let appliedActions = [];
        const checkboxes = document.querySelectorAll('.action-check:checked');
        checkboxes.forEach(cb => {
            let actionName = "";
            if (cb.value === 'fertilizer') { actionName = "追肥"; height += 5; costPoints += 10; }
            if (cb.value === 'weed_manual') { actionName = "手取り除草"; weedLevel = 0; costPoints += 30; }
            if (cb.value === 'herbicide') { actionName = "除草剤"; weedLevel = 0; costPoints += 20; }
            if (cb.value === 'fungicide') { actionName = "殺菌剤"; diseaseActive = false; costPoints += 15; }
            if (cb.value === 'pesticide') { actionName = "殺虫剤"; activePests = []; costPoints += 15; }
            appliedActions.push(actionName);
            cb.checked = false; 
        });

        const water = parseInt(document.getElementById('waterInput').value);
        let periodEvents = [];

        for (let i = 0; i < daysToAdvance; i++) {
            if (currentDay > TOTAL_DAYS) break;
            
            const stage = getStageInfo(currentDay);
            
            // --- 気温・天候の計算 ---
            let baseTemp = getBaseTemp(currentDay, region);
            
            // 異常気象年のベース底上げ/底下げ（±4〜6℃程度）
            if (climateType === "mega_hot") baseTemp += 5;
            if (climateType === "extreme_cold") baseTemp -= 5;

            let randWeather = Math.random();
            let weatherStr = "晴";
            let sunlight = 10; 
            
            let isTyphoon = false;
            let isRain = false;

            // 台風確率アップ（沖縄15%, 関東12%, 他5%）
            if (currentDay > TOTAL_DAYS * 0.6) {
                let typhoonProb = 0.05;
                if (region === 'okinawa') typhoonProb = 0.15;
                if (region === 'kanto') typhoonProb = 0.12;
                if (region === 'kyushu' || region === 'kansai') typhoonProb = 0.08;
                if (Math.random() < typhoonProb) isTyphoon = true;
            }

            // 温度障害による「異常気温の連鎖（3日間）」
            let tempModifier = (Math.random() * 4 - 2); 
            if (abnormalTendencyDays > 0) {
                if (abnormalTendencyDir === "hot") tempModifier += 3.5; // より暑く
                if (abnormalTendencyDir === "cold") tempModifier -= 3.5; // より寒く
                abnormalTendencyDays--;
            }

            let temp = baseTemp + tempModifier;

            if (isTyphoon) {
                isRain = true; weatherStr = "🌀台風"; sunlight = 0; periodEvents.push("台風襲来");
                temp -= 2; 
            } else if (randWeather < 0.3) {
                isRain = true; weatherStr = "☔雨"; sunlight = 2;
                temp -= 1.5;
            } else if (randWeather < 0.6) {
                weatherStr = "☁️曇"; sunlight = 5;
                temp -= 0.5;
            }

            temp = Math.round(temp * 10) / 10;
            cumulativeSunlight += sunlight;

            let growthRate = variety === "early" ? 0.4 : 0.3;
            if (variety === "high_yield") growthRate = 0.35;
            height += growthRate * (sunlight / 10);

            if (stage === "中干し期" && water > 0) { potentialYield -= 0.5; if(i==0) periodEvents.push("中干し失敗"); }
            if (stage.includes("出穂") && water < 3) { potentialYield -= 2; if(i==0) periodEvents.push("水不足"); }

            // --- 温度障害の判定（1日で即発症＆連鎖＆深刻化） ---
            if (temp < 18) {
                coldDays++; hotDays = 0;
                if (coldDays === 1) { abnormalTendencyDir = "cold"; abnormalTendencyDays = 3; }
            } else if (temp > 30) {
                hotDays++; coldDays = 0;
                if (hotDays === 1) { abnormalTendencyDir = "hot"; abnormalTendencyDays = 3; }
            } else {
                coldDays = 0; hotDays = 0;
            }

            // 雪だるま式のダメージ計算（1日目:1.5, 2日目:4, 3日目:7, 4日目:12...）
            if (coldDays > 0) {
                let damage = Math.round(Math.pow(coldDays, 1.5) * 1.5);
                potentialYield -= damage;
                periodEvents.push(coldDays === 1 ? "🥶低温障害(発症)" : "🥶低温障害(悪化)");
            }
            if (hotDays > 0) {
                let damage = Math.round(Math.pow(hotDays, 1.5) * 1.5);
                potentialYield -= damage;
                periodEvents.push(hotDays === 1 ? "🥵高温障害(発症)" : "🥵高温障害(悪化)");
            }

            if (weatherStr === "晴") dryDays++; else dryDays = 0;
            if (!isRain) weedLevel += 0.2;
            if (weedLevel > 5) potentialYield -= 0.5;

            // --- 病害虫の確率大幅アップ ---
            if (currentDay <= 40 && water >= 3 && ["kyushu", "kansai", "okinawa", "kanto"].includes(region) && Math.random() < 0.15) {
                if(!activePests.includes("ジャンボタニシ")) { activePests.push("ジャンボタニシ"); periodEvents.push("ジャンボタニシ発生"); }
            }
            if (currentDay > 30 && currentDay <= 80 && Math.random() < 0.10) {
                if(!activePests.includes("ニカメイチュウ")) { activePests.push("ニカメイチュウ"); periodEvents.push("ニカメイチュウ発生"); }
            }
            if (currentDay > 80 && temp >= 26 && (isRain || isTyphoon) && Math.random() < 0.15) {
                if(!activePests.includes("ウンカ類")) { activePests.push("ウンカ類"); periodEvents.push("ウンカ類飛来"); }
            }
            if (currentDay > 100 && dryDays >= 5 && Math.random() < 0.20) {
                if(!activePests.includes("バッタ")) { activePests.push("バッタ"); periodEvents.push("バッタ大量発生"); }
            }
            if (isRain && temp > 22 && temp < 28 && !diseaseActive && Math.random() < 0.12) {
                if (variety !== "resistant") { diseaseActive = true; periodEvents.push("いもち病発生"); }
            }

            if (diseaseActive) potentialYield -= 3;
            activePests.forEach(pest => {
                if (pest === "ジャンボタニシ") { potentialYield -= 2; height -= 0.3; }
                if (pest === "ニカメイチュウ") potentialYield -= 2;
                if (pest === "ウンカ類") potentialYield -= 5; // 坪枯れ級の大ダメージ
                if (pest === "バッタ") potentialYield -= 1.5;
            });

            if (isTyphoon) {
                let fallLimit = variety === "high_yield" ? 85 : 95;
                if (height > fallLimit) {
                    potentialYield -= 50; periodEvents.push("💥倒伏(大被害)");
                } else {
                    if(!periodEvents.includes("台風耐え抜き")) periodEvents.push("台風耐え抜き");
                }
            }

            if (i === daysToAdvance - 1 || currentDay === TOTAL_DAYS) {
                let actionStr = appliedActions.length > 0 ? appliedActions.join(", ") : "-";
                let uniqueEvents = [...new Set(periodEvents)];
                let eventStr = uniqueEvents.length > 0 ? uniqueEvents.join(", ") : "順調";
                
                logHistory(`Day ${currentDay}`, stage, `${temp}℃/${weatherStr}`, `${water}cm`, `${Math.round(height)}cm`, actionStr, eventStr);
                
                let sunIcon = "☀️";
                if(weatherStr === "☁️曇") sunIcon = "☁️";
                if(weatherStr === "☔雨") sunIcon = "☔";
                if(weatherStr === "🌀台風") sunIcon = "🌀";
                document.getElementById('visSun').innerText = sunIcon;
                document.getElementById('tempDisplay').innerText = temp;
            }

            chartLabels.push(currentDay);
            chartHeightData.push(Math.round(height));
            chartYieldData.push(Math.round(potentialYield));
            chartSunlightData.push(sunlight);
            
            currentDay++;
            if (potentialYield < 0) potentialYield = 0;
        }

        updateUI();
        updateChart();

        if (currentDay > TOTAL_DAYS) {
            setTimeout(() => {
                alert(`栽培終了！\n最終収量: ${Math.round(potentialYield)} kg/10a\n総日照時間: ${cumulativeSunlight}時間\n\n${climateType !== "normal" ? "異常気象の年でしたが、よく頑張りましたね！\n" : ""}グラフと履歴から考察を行ってください。`);
                document.getElementById('controlPanel').style.display = 'none';
            }, 500);
        }
    }

    function updateUI() {
        if (currentDay > TOTAL_DAYS) return;
        const stage = getStageInfo(currentDay);
        
        document.getElementById('dayDisplay').innerText = currentDay;
        document.getElementById('stageDisplay').innerText = stage;
        
        document.getElementById('heightDisplay').innerText = Math.round(height);
        document.getElementById('weedDisplay').innerText = Math.round(weedLevel);
        document.getElementById('yieldDisplay').innerText = Math.round(potentialYield);

        document.getElementById('diseaseAlert').style.display = diseaseActive ? 'block' : 'none';
        
        const pestAlert = document.getElementById('pestAlert');
        if (activePests.length > 0) {
            pestAlert.style.display = 'block';
            document.getElementById('pestListDisplay').innerText = activePests.join(", ");
        } else {
            pestAlert.style.display = 'none';
        }

        const visPlant = document.getElementById('visPlant');
        let plantStr = "🌱";
        if (height > 30) plantStr = "🌿";
        if (stage.includes("出穂") || stage.includes("登熟")) plantStr = "🌾";
        if (stage.includes("落水")) plantStr = "🌾🌾";
        visPlant.innerText = plantStr;
        
        visPlant.style.fontSize = Math.min(20 + height * 0.5, 70) + 'px';

        if (diseaseActive || activePests.length > 0 || hotDays > 0 || coldDays > 0) {
            visPlant.classList.add("sick-plant");
        } else {
            visPlant.classList.remove("sick-plant");
        }
    }

    function logHistory(dayStr, stage, weather, water, plantHeight, actions, events) {
        const tr = document.createElement('tr');
        if (events.includes("発生") || events.includes("障害") || events.includes("悪化") || events.includes("失敗") || events.includes("倒伏") || events.includes("飛来")) {
            tr.style.backgroundColor = "#ffebee";
        } else if (actions !== "-") {
            tr.style.backgroundColor = "#e8f5e9";
        }

        tr.innerHTML = `
            <td>${dayStr}</td>
            <td>${stage}</td>
            <td>${weather}</td>
            <td>${water}</td>
            <td>${plantHeight}</td>
            <td>${actions}</td>
            <td style="color:${tr.style.backgroundColor==='rgb(255, 235, 238)' ? 'red' : 'black'}">${events}</td>
        `;
        document.getElementById('historyBody').prepend(tr);
    }

    function initChart() {
        const ctx = document.getElementById('growthChart').getContext('2d');
        chartInstance = new Chart(ctx, {
            type: 'line',
            data: {
                labels: chartLabels,
                datasets: [
                    { type: 'line', label: '予想収量 (kg)', data: chartYieldData, borderColor: '#ff9800', backgroundColor: 'rgba(255, 152, 0, 0.1)', yAxisID: 'y', fill: true, tension: 0.1 },
                    { type: 'line', label: '草丈 (cm)', data: chartHeightData, borderColor: '#4caf50', yAxisID: 'y1', fill: false, tension: 0.1 },
                    { type: 'bar', label: '日照時間 (h)', data: chartSunlightData, backgroundColor: 'rgba(255, 235, 59, 0.6)', yAxisID: 'y2' }
                ]
            },
            options: {
                responsive: true, maintainAspectRatio: false,
                scales: {
                    x: { title: { display: true, text: '経過日数' } },
                    y: { type: 'linear', position: 'left', min: 0, max: 800, title: { display: true, text: '収量 (kg)' } },
                    y1: { type: 'linear', position: 'right', min: 0, max: 120, title: { display: true, text: '草丈 (cm)' }, grid: { drawOnChartArea: false } },
                    y2: { type: 'linear', position: 'right', min: 0, max: 40, display: false }
                }
            }
        });
    }

    function updateChart() {
        if (chartInstance) {
            chartInstance.data.labels = chartLabels;
            chartInstance.data.datasets[0].data = chartYieldData;
            chartInstance.data.datasets[1].data = chartHeightData;
            chartInstance.data.datasets[2].data = chartSunlightData;
            chartInstance.update();
        }
    }
</script>

</body>
</html>
