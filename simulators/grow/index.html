<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Plant Growth Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; font-family: 'Helvetica Neue', Arial, sans-serif; }
        .pot {
            position: relative;
            width: 160px;
            height: 100px;
            background: linear-gradient(to bottom, #8b4513, #5d2906);
            border-radius: 0 0 20px 20px;
            margin: 0 auto;
            z-index: 10;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }
        .soil {
            position: absolute;
            top: 0;
            width: 100%;
            height: 20px;
            background: #3d1f08;
            border-radius: 20px 20px 0 0;
            transform: translateY(-50%);
        }
        #plant-container {
            position: relative;
            height: 250px;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            overflow: visible;
        }
        .stem {
            position: absolute;
            bottom: 0;
            width: 6px;
            background: #4caf50;
            border-radius: 4px;
            transition: height 0.5s ease, background 1s ease;
            transform-origin: bottom;
        }
        .leaf {
            position: absolute;
            width: 24px;
            height: 16px;
            background: #8bc34a;
            border-radius: 50% 50% 0 50%;
            transition: all 0.5s ease;
        }
        .leaf.right {
            border-radius: 50% 50% 50% 0;
            transform: translateX(100%) rotate(20deg);
        }
        .leaf.left {
            transform: translateX(-100%) rotate(-20deg);
        }
        .withered { background: #a88d53 !important; }
        .dead { background: #5d4037 !important; }
        
        .status-card {
            background: white;
            padding: 1.25rem;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05);
            border: 1px solid #e2e8f0;
        }

        /* 背景変化のためのモニター専用スタイル */
        #visual-monitor {
            transition: background 1.5s ease-in-out;
            border: none;
            position: relative;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border-radius: 16px;
        }

        /* カスタムレンジスライダーのスタイル */
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px;
            width: 18px;
            border-radius: 50%;
            background: #10b981;
            cursor: pointer;
            margin-top: -6px;
        }
    </style>
</head>
<body class="p-4 bg-slate-50">
    <div class="max-w-4xl mx-auto">
        <!-- 1. 最上部: ビジュアルとメインステータス -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <!-- 植物のビジュアルモニタ -->
            <div id="visual-monitor" class="shadow-lg">
                <div id="plant-container">
                    <div id="plant-stem" class="stem" style="height: 10px;"></div>
                </div>
                <div class="pot">
                    <div class="soil"></div>
                    <div class="p-2 text-white text-center">
                        <div class="text-[10px] opacity-70 uppercase tracking-tighter text-white">Soil Moisture</div>
                        <div id="soilMoistureDisplay" class="text-lg font-bold">50%</div>
                    </div>
                </div>
                <div id="msgBox" class="absolute top-4 px-4 py-2 rounded-full text-xs font-bold hidden shadow-sm animate-bounce z-20"></div>
                <!-- 時刻ラベルをモニター内に配置 -->
                <div id="timeLabelMonitor" class="absolute bottom-2 right-2 px-2 py-1 bg-black/30 text-white text-[10px] rounded font-mono"></div>
            </div>

            <!-- 植物の状態サマリー -->
            <div class="status-card flex flex-col justify-between">
                <div>
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-lg font-bold text-slate-800">植物の現在の状態</h2>
                        <span id="timeDisplay" class="px-3 py-1 bg-slate-100 rounded-full text-xs font-mono font-bold text-slate-600">Day 1 00:00</span>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="p-3 bg-green-50 rounded-xl">
                            <p class="text-[10px] text-green-600 font-bold uppercase">成長段階</p>
                            <p id="stageDisplay" class="text-xl font-bold text-green-900">種子</p>
                        </div>
                        <div class="p-3 bg-blue-50 rounded-xl">
                            <p class="text-[10px] text-blue-600 font-bold uppercase">現在の高さ</p>
                            <p id="heightDisplay" class="text-xl font-bold text-blue-900">0.0 cm</p>
                        </div>
                        <div class="p-3 bg-red-50 rounded-xl">
                            <p class="text-[10px] text-red-600 font-bold uppercase">健康度</p>
                            <p id="healthDisplay" class="text-xl font-bold text-red-900">100%</p>
                        </div>
                        <div class="p-3 bg-yellow-50 rounded-xl">
                            <p class="text-[10px] text-yellow-600 font-bold uppercase">光合成効率</p>
                            <p id="photosynDisplay" class="text-xl font-bold text-yellow-900">0%</p>
                        </div>
                    </div>
                </div>
                <div class="mt-4 pt-4 border-t border-dashed">
                    <h3 class="text-xs font-bold text-slate-400 mb-2 uppercase tracking-widest text-center">Growth Progress</h3>
                    <div class="w-full bg-slate-100 rounded-full h-2">
                        <div id="growthBar" class="bg-green-500 h-2 rounded-full transition-all duration-500" style="width: 5%"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 2. 中段: 環境制御と時間操作 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
            <div class="status-card">
                <h2 class="text-md font-bold mb-4 text-slate-800 flex items-center">
                    <span class="mr-2">🌱</span>環境パラメータ（自動変動中）
                </h2>
                <div class="space-y-5">
                    <div>
                        <div class="flex justify-between mb-1">
                            <label class="text-xs font-bold text-slate-500 uppercase">日照強度 (Lux)</label>
                            <span id="lightVal" class="text-xs font-mono font-bold text-orange-500">0 Lux</span>
                        </div>
                        <input type="range" id="lightInput" min="0" max="10000" value="0" class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-orange-500">
                    </div>
                    <div>
                        <div class="flex justify-between mb-1">
                            <label class="text-xs font-bold text-slate-500 uppercase">周囲温度 (°C)</label>
                            <span id="tempVal" class="text-xs font-mono font-bold text-blue-500">15 °C</span>
                        </div>
                        <input type="range" id="tempInput" min="-10" max="50" value="15" class="w-full h-1.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-500">
                    </div>
                    <div class="flex gap-2 pt-2">
                        <button id="waterBtn" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white py-2.5 rounded-xl font-bold text-sm shadow-md transition-all active:scale-95">💧 水やり</button>
                        <button id="fertilizerBtn" class="flex-1 bg-purple-500 hover:bg-purple-600 text-white py-2.5 rounded-xl font-bold text-sm shadow-md transition-all active:scale-95">🧪 肥料</button>
                    </div>
                </div>
            </div>

            <div class="status-card flex flex-col justify-between">
                <div>
                    <h2 class="text-md font-bold mb-4 text-slate-800 flex items-center">
                        <span class="mr-2">⏱️</span>タイムコントロール
                    </h2>
                    <div class="grid grid-cols-2 gap-3">
                        <button id="stepBtn" class="bg-emerald-500 hover:bg-emerald-600 text-white py-3 rounded-xl font-bold text-sm shadow-md transition-all active:scale-95 flex flex-col items-center">
                            <span>+ 30分進む</span>
                        </button>
                        <button id="autoBtn" class="bg-slate-800 hover:bg-black text-white py-3 rounded-xl font-bold text-sm shadow-md transition-all active:scale-95 flex flex-col items-center">
                            <span id="autoBtnText">自動実行</span>
                        </button>
                    </div>
                </div>
                <button id="downloadBtn" class="w-full mt-4 bg-white border-2 border-slate-200 text-slate-600 hover:bg-slate-50 py-2.5 rounded-xl font-bold text-sm transition-all active:scale-95 flex items-center justify-center">
                    📊 ログをCSV出力
                </button>
            </div>
        </div>

        <!-- 3. 下段: 詳細ログ -->
        <div class="status-card">
            <h2 class="text-xs font-bold mb-3 text-slate-400 uppercase tracking-widest">詳細履歴ログ (30分毎)</h2>
            <div class="h-40 overflow-y-auto pr-2 custom-scrollbar text-center">
                <table class="w-full text-left text-[11px] font-mono border-collapse mx-auto">
                    <thead class="sticky top-0 bg-white">
                        <tr class="text-slate-400 border-b border-slate-100">
                            <th class="py-1">TIME</th>
                            <th>LUX</th>
                            <th>TEMP</th>
                            <th>MOIST</th>
                            <th>HEALTH</th>
                            <th>HEIGHT</th>
                        </tr>
                    </thead>
                    <tbody id="logContent">
                        <!-- ログ行 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const STEP_MINUTES = 30;
        const GROWTH_FACTOR = 0.005; 
        
        let state = {
            minutes: 0,
            plant: {
                height: 5, 
                health: 100,
                stage: 'Seedling', 
                soilMoisture: 50, 
                nutrients: 20,
                totalGrowth: 0
            },
            env: {
                light: 0,
                temp: 15,
                manualOverride: false
            },
            logs: [],
            isAuto: false,
            autoTimer: null
        };

        const lightInput = document.getElementById('lightInput');
        const tempInput = document.getElementById('tempInput');
        const lightVal = document.getElementById('lightVal');
        const tempVal = document.getElementById('tempVal');
        const stem = document.getElementById('plant-stem');
        const container = document.getElementById('plant-container');
        const growthBar = document.getElementById('growthBar');
        const visualMonitor = document.getElementById('visual-monitor');

        function init() {
            updateEnvironmentByTime();
            updateDisplay();
            setupEventListeners();
        }

        function setupEventListeners() {
            lightInput.oninput = (e) => {
                state.env.light = parseInt(e.target.value);
                state.env.manualOverride = true;
                updateDisplay();
            };
            tempInput.oninput = (e) => {
                state.env.temp = parseInt(e.target.value);
                state.env.manualOverride = true;
                updateDisplay();
            };

            document.getElementById('waterBtn').onclick = () => {
                state.plant.soilMoisture = Math.min(100, state.plant.soilMoisture + 30);
                showMessage("💧 水をあげました", "bg-blue-500 text-white");
                updateDisplay();
            };

            document.getElementById('fertilizerBtn').onclick = () => {
                state.plant.nutrients = Math.min(100, state.plant.nutrients + 50);
                showMessage("🧪 肥料を投入しました", "bg-purple-500 text-white");
                updateDisplay();
            };

            document.getElementById('stepBtn').onclick = () => simulateStep();
            
            document.getElementById('autoBtn').onclick = () => {
                state.isAuto = !state.isAuto;
                const btn = document.getElementById('autoBtn');
                const btnText = document.getElementById('autoBtnText');
                if (state.isAuto) {
                    btnText.innerText = "停止";
                    btn.classList.replace("bg-slate-800", "bg-red-500");
                    state.autoTimer = setInterval(simulateStep, 200);
                } else {
                    btnText.innerText = "自動実行";
                    btn.classList.replace("bg-red-500", "bg-slate-800");
                    clearInterval(state.autoTimer);
                }
            };

            document.getElementById('downloadBtn').onclick = downloadCSV;
        }

        function updateEnvironmentByTime() {
            const totalMinutesInDay = 24 * 60;
            const hour = (state.minutes % totalMinutesInDay) / 60;
            
            let targetLight = 0;
            if (hour >= 5.5 && hour <= 18.5) {
                targetLight = Math.sin((hour - 5.5) / 13 * Math.PI) * 10000;
            }
            
            const tempBase = 18;
            const tempVar = Math.sin((hour - 8) / 12 * Math.PI) * 10;
            const targetTemp = tempBase + (hour >= 4 && hour <= 21 ? tempVar : -4);

            if (!state.env.manualOverride) {
                state.env.light = Math.round(Math.max(0, targetLight));
                state.env.temp = Math.round(targetTemp);
            }
        }

        function simulateStep() {
            if (state.plant.stage === 'Dead') return;

            state.minutes += STEP_MINUTES;
            
            state.env.manualOverride = false;
            updateEnvironmentByTime();

            const evaporation = (state.env.temp * 0.06) + (state.env.light * 0.0001);
            state.plant.soilMoisture = Math.max(0, state.plant.soilMoisture - evaporation);

            const tempEffect = Math.max(0, 1 - Math.pow(Math.abs(state.env.temp - 24) / 25, 2));
            const lightEffect = Math.min(1, state.env.light / 6500) * (state.env.light > 0 ? 1 : 0);
            const moistureEffect = state.plant.soilMoisture > 15 ? 1 : state.plant.soilMoisture / 15;
            
            const psEfficiency = tempEffect * lightEffect * moistureEffect;

            let healthDelta = 0.2;
            if (state.plant.soilMoisture < 10) healthDelta = -1.5;
            if (state.plant.soilMoisture > 95) healthDelta = -0.5;
            if (state.env.temp > 42 || state.env.temp < 2) healthDelta = -2.0;
            
            state.plant.health = Math.max(0, Math.min(100, state.plant.health + healthDelta));

            if (state.plant.health > 25) {
                const growth = psEfficiency * GROWTH_FACTOR * (state.plant.nutrients / 100 + 0.8) * 12;
                state.plant.height += growth;
                state.plant.totalGrowth += growth;
                state.plant.nutrients = Math.max(0, state.plant.nutrients - (growth * 0.05));
            }

            if (state.plant.health <= 0) {
                state.plant.stage = 'Dead';
            } else if (state.plant.height > 150) {
                state.plant.stage = 'Mature';
            } else if (state.plant.height > 20) {
                state.plant.stage = 'Sprout';
            }

            recordLog(psEfficiency);
            updateDisplay();
        }

        function recordLog(ps) {
            const day = Math.floor(state.minutes / (24 * 60)) + 1;
            const hour = Math.floor((state.minutes % (24 * 60)) / 60);
            const min = state.minutes % 60;
            const timeStr = `D${day} ${hour.toString().padStart(2, '0')}:${min.toString().padStart(2, '0')}`;

            const entry = {
                time: timeStr,
                light: state.env.light,
                temp: state.env.temp,
                moisture: state.plant.soilMoisture.toFixed(1),
                health: state.plant.health.toFixed(1),
                height: (state.plant.height/10).toFixed(2),
                efficiency: (ps * 100).toFixed(1)
            };

            state.logs.push(entry);

            const logDiv = document.getElementById('logContent');
            const row = document.createElement('tr');
            row.className = "border-b border-slate-50 text-slate-600";
            row.innerHTML = `
                <td class="py-1 font-bold">${entry.time}</td>
                <td>${entry.light}</td>
                <td>${entry.temp}°</td>
                <td>${entry.moisture}%</td>
                <td>${entry.health}%</td>
                <td class="text-blue-600">${entry.height}cm</td>
            `;
            logDiv.prepend(row);
        }

        function updateDisplay() {
            const day = Math.floor(state.minutes / (24 * 60)) + 1;
            const hour = Math.floor((state.minutes % (24 * 60)) / 60);
            const min = state.minutes % 60;
            const timeStr = `${hour.toString().padStart(2, '0')}:${min.toString().padStart(2, '0')}`;

            document.getElementById('timeDisplay').innerText = `Day ${day} ${timeStr}`;
            document.getElementById('timeLabelMonitor').innerText = timeStr;
            document.getElementById('stageDisplay').innerText = translateStage(state.plant.stage);
            document.getElementById('heightDisplay').innerText = `${(state.plant.height/10).toFixed(2)} cm`;
            document.getElementById('healthDisplay').innerText = `${Math.ceil(state.plant.health)}%`;
            document.getElementById('soilMoistureDisplay').innerText = `${Math.ceil(state.plant.soilMoisture)}%`;
            
            const psEff = state.logs.length > 0 ? state.logs[state.logs.length-1].efficiency : 0;
            document.getElementById('photosynDisplay').innerText = `${psEff}%`;

            lightVal.innerText = `${state.env.light} Lux`;
            tempVal.innerText = `${state.env.temp} °C`;
            lightInput.value = state.env.light;
            tempInput.value = state.env.temp;

            const progress = Math.min(100, (state.plant.height / 150) * 100);
            growthBar.style.width = `${progress}%`;

            // モニターの背景を更新
            updateVisualMonitorBackground(hour);

            const visualHeight = Math.min(230, state.plant.height * 1.5);
            stem.style.height = `${visualHeight}px`;

            if (state.plant.health < 40) {
                stem.classList.add('withered');
            } else {
                stem.classList.remove('withered');
            }

            if (state.plant.stage === 'Dead') {
                stem.classList.add('dead');
                showMessage("💀 植物が枯れてしまいました", "bg-slate-800 text-white");
                if(state.isAuto) document.getElementById('autoBtn').click();
            }

            const leafCount = Math.floor(state.plant.height / 12);
            const currentLeaves = container.querySelectorAll('.leaf').length;
            if (leafCount > currentLeaves && state.plant.stage !== 'Dead') {
                createLeaf(visualHeight);
            }
        }

        function updateVisualMonitorBackground(hour) {
            let bgStyle = "";
            if (hour >= 4 && hour < 6) {
                // 夜明け
                bgStyle = "linear-gradient(to bottom, #2e1065, #fb923c)";
            } else if (hour >= 6 && hour < 10) {
                // 朝
                bgStyle = "linear-gradient(to bottom, #7dd3fc, #f0f9ff)";
            } else if (hour >= 10 && hour < 15) {
                // 正午
                bgStyle = "linear-gradient(to bottom, #0ea5e9, #bae6fd)";
            } else if (hour >= 15 && hour < 17) {
                // 午後
                bgStyle = "linear-gradient(to bottom, #38bdf8, #e0f2fe)";
            } else if (hour >= 17 && hour < 19) {
                // 夕焼け
                bgStyle = "linear-gradient(to bottom, #f97316, #4c1d95)";
            } else if (hour >= 19 && hour < 21) {
                // 薄暮
                bgStyle = "linear-gradient(to bottom, #1e1b4b, #312e81)";
            } else {
                // 深夜
                bgStyle = "linear-gradient(to bottom, #020617, #1e1b4b)";
            }
            
            // 直接スタイルを適用（Tailwindのクラスを上書きするため）
            visualMonitor.style.background = bgStyle;
        }

        function createLeaf(currentStemHeight) {
            const leaf = document.createElement('div');
            leaf.className = `leaf ${Math.random() > 0.5 ? 'right' : 'left'}`;
            leaf.style.bottom = `${currentStemHeight - 5}px`;
            container.appendChild(leaf);
        }

        function translateStage(stage) {
            const m = { 'Seedling': '新芽', 'Sprout': '成長期', 'Mature': '成熟', 'Dead': '枯死' };
            return m[stage] || stage;
        }

        function showMessage(text, classes) {
            const box = document.getElementById('msgBox');
            box.innerText = text;
            box.className = `absolute top-4 px-4 py-2 rounded-full text-xs font-bold shadow-sm animate-bounce z-20 ${classes}`;
            box.classList.remove('hidden');
            setTimeout(() => box.classList.add('hidden'), 3000);
        }

        function downloadCSV() {
            if (state.logs.length === 0) return;
            const headers = ["Time", "Light(Lux)", "Temp(C)", "SoilMoisture(%)", "Health(%)", "Height(cm)", "PS_Efficiency(%)"];
            const rows = state.logs.map(l => [l.time, l.light, l.temp, l.moisture, l.health, l.height, l.efficiency]);
            let csvContent = "data:text/csv;charset=utf-8," + headers.join(",") + "\n" + rows.map(e => e.join(",")).join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `plant_growth_report.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        window.onload = init;
    </script>
</body>
</html>
