<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Farm Simulator - Advanced Blocks</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; overflow: hidden; background-color: #f0f4f8; }
        .block-container { height: 500px; overflow-y: auto; }
        
        /* ブロックの基本スタイル */
        .block { 
            cursor: grab; 
            transition: transform 0.1s; 
            user-select: none;
            margin-bottom: 4px;
            border-radius: 4px;
            font-size: 13px;
            position: relative;
        }
        .block:active { cursor: grabbing; }

        /* 条件分岐ブロック（入れ子用） */
        .block-if {
            background-color: #fb923c; /* orange-400 */
            border: 2px solid #ea580c;
            min-width: 200px;
        }
        .block-action {
            padding: 8px 12px;
            background-color: #3b82f6; /* blue-500 */
            color: white;
            border-bottom: 3px solid rgba(0,0,0,0.2);
        }
        .block-nutrient { background-color: #22c55e; } /* green-500 */

        /* 入れ子エリア（スロット） */
        .slot {
            min-height: 32px;
            background-color: rgba(255, 255, 255, 0.2);
            margin: 4px 4px 4px 20px;
            border-radius: 4px;
            border: 1px dashed rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 4px;
        }

        .drop-zone { min-height: 300px; border: 2px dashed #cbd5e1; border-radius: 8px; background: white; }
        
        /* シミュレーション画面 */
        .plant-box {
            background: linear-gradient(to bottom, #e0f2fe 0%, #bae6fd 100%);
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            height: 200px;
        }
        .water {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(56, 189, 248, 0.6);
            transition: height 0.5s;
        }
        .led-light {
            position: absolute;
            top: 0;
            width: 100%;
            height: 20px;
            background: #475569;
            transition: all 0.3s;
        }
        .led-active { background: #fde047; box-shadow: 0 10px 30px rgba(253, 224, 71, 0.8); }
        .lettuce {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            transition: all 0.5s;
            font-size: 2.5rem;
        }
        .log-panel { font-family: monospace; font-size: 11px; height: 100px; overflow-y: auto; }
        
        /* ドラッグ中のハイライト */
        .slot-highlight { background-color: rgba(255, 255, 255, 0.5) !important; border: 1px solid white !important; }
    </style>
</head>
<body class="p-4 bg-slate-100">
    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- 左側：シミュレーター -->
        <div class="lg:col-span-4 space-y-4">
            <div class="bg-white p-6 rounded-2xl shadow-lg border border-slate-200">
                <h2 class="text-xl font-bold mb-4 text-slate-800 flex items-center">
                    <span class="mr-2">🌱</span> 植物工場の状態
                </h2>
                
                <div class="plant-box border-4 border-slate-700 relative">
                    <div id="led" class="led-light"></div>
                    <div id="plant" class="lettuce">🥬</div>
                    <div id="water-level" class="water" style="height: 45px;"></div>
                </div>

                <div class="grid grid-cols-2 gap-3 mt-4 text-sm">
                    <div class="bg-blue-50 p-2 rounded-lg border border-blue-100">
                        <p class="text-[10px] text-blue-600 font-bold uppercase">気温</p>
                        <p class="text-lg font-bold text-slate-700"><span id="sensor-temp">24.0</span>°C</p>
                    </div>
                    <div class="bg-green-50 p-2 rounded-lg border border-green-100">
                        <p class="text-[10px] text-green-600 font-bold uppercase">EC値</p>
                        <p class="text-lg font-bold text-slate-700"><span id="sensor-ec">1.2</span> <small>ms/cm</small></p>
                    </div>
                    <div class="bg-yellow-50 p-2 rounded-lg border border-yellow-100">
                        <p class="text-[10px] text-yellow-600 font-bold uppercase">光量</p>
                        <p class="text-lg font-bold text-slate-700"><span id="sensor-light">150</span> <small>lux</small></p>
                    </div>
                    <div class="bg-purple-50 p-2 rounded-lg border border-purple-100">
                        <p class="text-[10px] text-purple-600 font-bold uppercase">成長</p>
                        <div class="w-full bg-purple-200 rounded-full h-2 mt-1">
                            <div id="growth-bar" class="bg-purple-600 h-2 rounded-full" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 text-green-400 p-4 rounded-xl shadow-inner border border-slate-700">
                <div id="log" class="log-panel"></div>
            </div>
        </div>

        <!-- 右側：プログラミング -->
        <div class="lg:col-span-8 space-y-4">
            <div class="bg-white p-5 rounded-2xl shadow-lg border border-slate-200 flex flex-col h-full">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-slate-800">🧩 ロジックエディタ</h2>
                    <div class="flex gap-2">
                        <button onclick="runProgram()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2 rounded-full font-bold shadow-md transition flex items-center">
                            <span class="mr-2">▶</span> 実行
                        </button>
                        <button onclick="stopProgram()" class="bg-rose-500 hover:bg-rose-600 text-white px-5 py-2 rounded-full font-bold shadow-md transition">停止</button>
                        <button onclick="resetSim()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-5 py-2 rounded-full font-bold transition">リセット</button>
                    </div>
                </div>

                <div class="grid grid-cols-12 gap-4">
                    <!-- ツールボックス -->
                    <div class="col-span-4 bg-slate-50 p-4 rounded-xl border border-slate-200 block-container">
                        <p class="text-xs font-bold text-slate-400 mb-4 uppercase tracking-widest">Blocks</p>
                        
                        <!-- 条件分岐テンプレート -->
                        <div class="block block-if text-white rounded shadow-sm overflow-hidden mb-4" draggable="true" data-type="if_else_light">
                            <div class="p-2 font-bold bg-orange-500">もし 光 < 100 なら</div>
                            <div class="slot" data-role="then"></div>
                            <div class="p-2 font-bold bg-orange-500">でなければ</div>
                            <div class="slot" data-role="else"></div>
                        </div>

                        <div class="block block-if text-white rounded shadow-sm overflow-hidden mb-4" draggable="true" data-type="if_else_ec">
                            <div class="p-2 font-bold bg-orange-600">もし 栄養 < 1.0 なら</div>
                            <div class="slot" data-role="then"></div>
                            <div class="p-2 font-bold bg-orange-600">でなければ</div>
                            <div class="slot" data-role="else"></div>
                        </div>

                        <!-- アクションテンプレート -->
                        <div class="block block-action rounded" draggable="true" data-type="led_on">LEDをつける</div>
                        <div class="block block-action rounded" draggable="true" data-type="led_off">LEDを消す</div>
                        <div class="block block-action block-nutrient rounded" draggable="true" data-type="add_nutrient">肥料を投入</div>
                    </div>

                    <!-- ワークスペース -->
                    <div class="col-span-8">
                        <div id="workspace" class="drop-zone p-4 overflow-auto max-h-[500px]">
                            <!-- ここにメインプログラムが組まれる -->
                        </div>
                        <div class="mt-4 p-3 bg-blue-50 border border-blue-100 rounded-lg text-xs text-blue-700">
                            <strong>使い方:</strong> 左からブロックをドラッグして、白いエリアやオレンジの枠の中にドロップしてください。ブロックをクリックすると削除できます。
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 状態管理 ---
        let state = {
            temp: 24.0,
            ec: 1.2,
            light: 50,
            growth: 0,
            ledActive: false,
            isRunning: false,
            timer: null
        };

        // --- ロギング ---
        function addLog(msg, type = 'info') {
            const time = new Date().toLocaleTimeString('ja-JP', { hour12: false });
            const colors = { error: 'text-rose-400', success: 'text-emerald-400', info: 'text-sky-400' };
            const logEl = document.getElementById('log');
            logEl.innerHTML = `<div><span class="text-slate-500">[${time}]</span> <span class="${colors[type]}">${msg}</span></div>` + logEl.innerHTML;
        }

        // --- ドラッグ＆ドロップエンジン ---
        let draggedElement = null;

        document.addEventListener('dragstart', (e) => {
            if (e.target.classList.contains('block')) {
                draggedElement = e.target;
                e.dataTransfer.setData('text/plain', ''); // Firefox対策
            }
        });

        document.addEventListener('dragover', (e) => {
            const slot = e.target.closest('.slot') || e.target.closest('#workspace');
            if (slot) {
                e.preventDefault();
                slot.classList.add('slot-highlight');
            }
        });

        document.addEventListener('dragleave', (e) => {
            const slot = e.target.closest('.slot') || e.target.closest('#workspace');
            if (slot) slot.classList.remove('slot-highlight');
        });

        document.addEventListener('drop', (e) => {
            const target = e.target.closest('.slot') || e.target.closest('#workspace');
            if (target && draggedElement) {
                e.preventDefault();
                target.classList.remove('slot-highlight');

                // 新規作成か移動か
                let blockToDrop;
                if (draggedElement.parentElement.id === 'block-palette' || draggedElement.closest('.block-container')) {
                    blockToDrop = draggedElement.cloneNode(true);
                    blockToDrop.onclick = (ev) => {
                        ev.stopPropagation();
                        blockToDrop.remove();
                    };
                } else {
                    blockToDrop = draggedElement;
                }

                target.appendChild(blockToDrop);
            }
            draggedElement = null;
        });

        // --- プログラム実行エンジン (再帰的) ---
        function executeBlockList(elementList) {
            for (let block of elementList) {
                const type = block.dataset.type;

                if (type === 'if_else_light' || type === 'if_else_ec') {
                    const condition = (type === 'if_else_light') ? (state.light < 100) : (state.ec < 1.0);
                    const thenSlot = block.querySelector('[data-role="then"]');
                    const elseSlot = block.querySelector('[data-role="else"]');

                    if (condition) {
                        executeBlockList(thenSlot.children);
                    } else {
                        executeBlockList(elseSlot.children);
                    }
                } else {
                    // アクション実行
                    applyAction(type);
                }
            }
        }

        function applyAction(type) {
            switch(type) {
                case 'led_on':
                    if (!state.ledActive) addLog("LED点灯", "success");
                    state.ledActive = true;
                    break;
                case 'led_off':
                    if (state.ledActive) addLog("LED消灯");
                    state.ledActive = false;
                    break;
                case 'add_nutrient':
                    state.ec += 0.4;
                    addLog("肥料投入 (EC+0.4)", "success");
                    break;
            }
        }

        // --- シミュレーションループ ---
        function updateSimulation() {
            if (!state.isRunning) return;

            // 自然現象
            state.temp += (Math.random() - 0.5) * 0.1;
            state.ec -= 0.003;
            state.light = state.ledActive ? 400 : 60 + (Math.random() * 10);

            // プログラムの実行
            const rootBlocks = document.getElementById('workspace').children;
            executeBlockList(rootBlocks);

            // 成長
            let growthStep = 0;
            if (state.light > 250) growthStep += 0.2;
            if (state.ec >= 0.8 && state.ec <= 2.0) growthStep += 0.3;
            state.growth = Math.min(100, state.growth + growthStep);

            render();
            state.timer = setTimeout(updateSimulation, 500);
        }

        function render() {
            document.getElementById('sensor-temp').innerText = state.temp.toFixed(1);
            document.getElementById('sensor-ec').innerText = state.ec.toFixed(2);
            document.getElementById('sensor-light').innerText = Math.round(state.light);
            document.getElementById('growth-bar').style.width = `${state.growth}%`;

            const led = document.getElementById('led');
            state.ledActive ? led.classList.add('led-active') : led.classList.remove('led-active');

            const plant = document.getElementById('plant');
            plant.style.transform = `translateX(-50%) scale(${1 + state.growth/60})`;
            if (state.growth > 80) plant.innerText = "🥬";
            else if (state.growth > 30) plant.innerText = "🌱";
            else plant.innerText = "🔹";
        }

        // --- UI操作 ---
        function runProgram() {
            if (state.isRunning) return;
            state.isRunning = true;
            addLog("プログラム実行中...", "info");
            updateSimulation();
        }

        function stopProgram() {
            state.isRunning = false;
            clearTimeout(state.timer);
            addLog("停止しました", "error");
        }

        function resetSim() {
            stopProgram();
            state = { temp: 24.0, ec: 1.2, light: 50, growth: 0, ledActive: false, isRunning: false, timer: null };
            addLog("リセット完了");
            render();
        }

        window.onload = render;
    </script>
</body>
</html>
