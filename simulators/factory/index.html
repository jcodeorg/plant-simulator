<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Farm Simulator - Customizable Logic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans JP', sans-serif; overflow: hidden; background-color: #f0f4f8; }
        .block-container { height: 500px; overflow-y: auto; }
        
        /* ブロックの基本スタイル */
        .block { 
            cursor: grab; 
            transition: transform 0.1s; 
            user-select: none;
            margin-bottom: 4px;
            border-radius: 4px;
            font-size: 13px;
            position: relative;
        }
        .block:active { cursor: grabbing; }

        .block-if {
            background-color: #fb923c;
            border: 2px solid #ea580c;
            min-width: 280px;
        }
        .block-action {
            padding: 8px 12px;
            background-color: #3b82f6;
            color: white;
            border-bottom: 3px solid rgba(0,0,0,0.2);
        }
        .block-nutrient { background-color: #22c55e; }

        /* 入力要素のスタイル */
        .block-input {
            background: white;
            color: #334155;
            border-radius: 4px;
            border: none;
            padding: 2px 4px;
            font-weight: bold;
            outline: none;
        }
        select.block-input { cursor: pointer; }
        input[type="number"].block-input { width: 50px; }

        .slot {
            min-height: 32px;
            background-color: rgba(255, 255, 255, 0.2);
            margin: 4px 4px 4px 20px;
            border-radius: 4px;
            border: 1px dashed rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding: 4px;
        }

        .drop-zone { min-height: 300px; border: 2px dashed #cbd5e1; border-radius: 8px; background: white; }
        
        /* 植物ショーケース */
        .showcase {
            background: #1e293b;
            border: 8px solid #475569;
            border-radius: 12px;
            height: 280px;
            position: relative;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 10px;
            overflow: hidden;
        }
        .shelf {
            background: rgba(255,255,255,0.05);
            border-bottom: 4px solid #334155;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 5px;
        }
        .water-layer {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(56, 189, 248, 0.3);
            transition: height 0.5s, background-color 0.5s;
            z-index: 1;
        }
        .plant-unit {
            font-size: 2rem;
            z-index: 2;
            transition: transform 0.5s ease-out;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }
        .led-strip {
            position: absolute;
            top: 2px;
            left: 10%;
            right: 10%;
            height: 4px;
            background: #475569;
            border-radius: 2px;
            transition: all 0.3s;
        }
        .led-active {
            background: #fde047;
            box-shadow: 0 5px 15px rgba(253, 224, 71, 0.9);
        }

        .log-panel { font-family: monospace; font-size: 11px; height: 100px; overflow-y: auto; }
        .slot-highlight { background-color: rgba(255, 255, 255, 0.5) !important; border: 1px solid white !important; }
    </style>
</head>
<body class="p-4 bg-slate-100">
    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <!-- 左側：シミュレーター -->
        <div class="lg:col-span-5 space-y-4">
            <div class="bg-white p-6 rounded-2xl shadow-lg border border-slate-200">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-slate-800 flex items-center">
                        <span class="mr-2">🏪</span> 植物ショーケース
                    </h2>
                    <span id="status-badge" class="px-2 py-1 bg-green-100 text-green-700 text-xs font-bold rounded">稼働中</span>
                </div>
                
                <div class="showcase" id="main-showcase">
                    <!-- LED (Top) -->
                    <div id="led-top" class="led-strip" style="top: 5px;"></div>
                    <!-- Shelf 1 -->
                    <div class="shelf"><div class="water-layer" id="water-1"></div><div class="plant-unit" id="p1">🌱</div></div>
                    <div class="shelf"><div class="water-layer" id="water-2"></div><div class="plant-unit" id="p2">🌱</div></div>
                    <div class="shelf"><div class="water-layer" id="water-3"></div><div class="plant-unit" id="p3">🌱</div></div>
                    <!-- LED (Middle) -->
                    <div id="led-mid" class="led-strip" style="top: 50%;"></div>
                    <!-- Shelf 2 -->
                    <div class="shelf"><div class="water-layer" id="water-4"></div><div class="plant-unit" id="p4">🌱</div></div>
                    <div class="shelf"><div class="water-layer" id="water-5"></div><div class="plant-unit" id="p5">🌱</div></div>
                    <div class="shelf"><div class="water-layer" id="water-6"></div><div class="plant-unit" id="p6">🌱</div></div>
                </div>

                <div class="grid grid-cols-2 gap-3 mt-4 text-sm">
                    <div class="bg-blue-50 p-2 rounded-lg border border-blue-100">
                        <p class="text-[10px] text-blue-600 font-bold uppercase">気温</p>
                        <p class="text-lg font-bold text-slate-700"><span id="sensor-temp">24.0</span>°C</p>
                    </div>
                    <div class="bg-green-50 p-2 rounded-lg border border-green-100">
                        <p class="text-[10px] text-green-600 font-bold uppercase">EC値 (栄養)</p>
                        <p class="text-lg font-bold text-slate-700"><span id="sensor-ec">1.2</span> <small>ms/cm</small></p>
                    </div>
                    <div class="bg-yellow-50 p-2 rounded-lg border border-yellow-100">
                        <p class="text-[10px] text-yellow-600 font-bold uppercase">光量</p>
                        <p class="text-lg font-bold text-slate-700"><span id="sensor-light">150</span> <small>lux</small></p>
                    </div>
                    <div class="bg-purple-50 p-2 rounded-lg border border-purple-100">
                        <p class="text-[10px] text-purple-600 font-bold uppercase">平均成長率</p>
                        <div class="w-full bg-purple-200 rounded-full h-2 mt-1">
                            <div id="growth-bar" class="bg-purple-600 h-2 rounded-full" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-slate-900 text-green-400 p-4 rounded-xl shadow-inner border border-slate-700">
                <div id="log" class="log-panel"></div>
            </div>
        </div>

        <!-- 右側：プログラミング -->
        <div class="lg:col-span-7 space-y-4">
            <div class="bg-white p-5 rounded-2xl shadow-lg border border-slate-200 flex flex-col h-full">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-slate-800">🧩 制御ロジック</h2>
                    <div class="flex gap-2">
                        <button id="btn-run" onclick="toggleProgram()" class="bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2 rounded-full font-bold shadow-md transition flex items-center">
                            <span id="run-icon" class="mr-2">▶</span> <span id="run-text">プログラム実行</span>
                        </button>
                        <button onclick="resetSim()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 px-5 py-2 rounded-full font-bold transition">リセット</button>
                    </div>
                </div>

                <div class="grid grid-cols-12 gap-4">
                    <div class="col-span-5 bg-slate-50 p-4 rounded-xl border border-slate-200 block-container">
                        <p class="text-xs font-bold text-slate-400 mb-4 uppercase tracking-widest">Blocks</p>
                        
                        <!-- カスタム条件ブロック -->
                        <div class="block block-if text-white rounded shadow-sm overflow-hidden mb-4" draggable="true" data-type="custom_if_else">
                            <div class="p-2 font-bold bg-orange-500 flex items-center gap-1 flex-wrap">
                                <span>もし</span>
                                <select class="block-input sensor-select">
                                    <option value="light">光量</option>
                                    <option value="temp">気温</option>
                                    <option value="ec">栄養</option>
                                </select>
                                <select class="block-input operator-select">
                                    <option value="lt">＜</option>
                                    <option value="gt">＞</option>
                                    <option value="eq">＝</option>
                                </select>
                                <input type="number" class="block-input value-input" value="100">
                                <span>なら</span>
                            </div>
                            <div class="slot" data-role="then"></div>
                            <div class="p-1 font-bold bg-orange-500 text-xs px-2">でなければ</div>
                            <div class="slot" data-role="else"></div>
                        </div>

                        <div class="block block-action rounded" draggable="true" data-type="led_on">LEDをつける</div>
                        <div class="block block-action rounded" draggable="true" data-type="led_off">LEDを消す</div>
                        <div class="block block-action block-nutrient rounded" draggable="true" data-type="add_nutrient">肥料を投入</div>
                    </div>

                    <div class="col-span-7">
                        <div id="workspace" class="drop-zone p-4 overflow-auto max-h-[500px]"></div>
                        <p class="text-[10px] text-slate-400 mt-2">※実行中は0.5秒ごとにこのロジックが評価されます。</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 状態管理 ---
        let state = {
            temp: 22.0,
            ec: 1.5,
            light: 60,
            growth: 0,
            ledActive: false,
            isProgramRunning: false,
            lastTick: Date.now()
        };

        // --- ロギング ---
        function addLog(msg, type = 'info') {
            const time = new Date().toLocaleTimeString('ja-JP', { hour12: false });
            const colors = { error: 'text-rose-400', success: 'text-emerald-400', info: 'text-sky-400' };
            const logEl = document.getElementById('log');
            logEl.innerHTML = `<div><span class="text-slate-500">[${time}]</span> <span class="${colors[type]}">${msg}</span></div>` + logEl.innerHTML;
        }

        // --- ドラッグ＆ドロップ ---
        let draggedElement = null;
        document.addEventListener('dragstart', (e) => { 
            if (e.target.classList.contains('block')) draggedElement = e.target; 
            e.dataTransfer.setData('text/plain', ''); 
        });
        
        document.addEventListener('dragover', (e) => { 
            const slot = e.target.closest('.slot') || e.target.closest('#workspace'); 
            if (slot) { e.preventDefault(); slot.classList.add('slot-highlight'); } 
        });
        
        document.addEventListener('dragleave', (e) => { 
            const slot = e.target.closest('.slot') || e.target.closest('#workspace'); 
            if (slot) slot.classList.remove('slot-highlight'); 
        });
        
        document.addEventListener('drop', (e) => {
            const target = e.target.closest('.slot') || e.target.closest('#workspace');
            if (target && draggedElement) {
                e.preventDefault();
                target.classList.remove('slot-highlight');
                let blockToDrop;
                if (draggedElement.closest('.block-container')) {
                    blockToDrop = draggedElement.cloneNode(true);
                    
                    // クローンした要素内のドロップダウンや入力値がリセットされないようにする
                    const selects = draggedElement.querySelectorAll('select');
                    const cloneSelects = blockToDrop.querySelectorAll('select');
                    selects.forEach((s, i) => cloneSelects[i].value = s.value);
                    
                    const inputs = draggedElement.querySelectorAll('input');
                    const cloneInputs = blockToDrop.querySelectorAll('input');
                    inputs.forEach((inpt, i) => cloneInputs[i].value = inpt.value);

                    blockToDrop.onclick = (ev) => { 
                        // 入力欄クリック時は削除しない
                        if (ev.target.tagName === 'SELECT' || ev.target.tagName === 'INPUT') return;
                        ev.stopPropagation(); 
                        blockToDrop.remove(); 
                    };
                } else { 
                    blockToDrop = draggedElement; 
                }
                target.appendChild(blockToDrop);
            }
            draggedElement = null;
        });

        // --- 実行エンジン ---
        function executeBlockList(elementList) {
            for (let block of elementList) {
                const type = block.dataset.type;
                if (type === 'custom_if_else') {
                    const sensorType = block.querySelector('.sensor-select').value;
                    const operator = block.querySelector('.operator-select').value;
                    const targetValue = parseFloat(block.querySelector('.value-input').value);
                    
                    let currentValue = 0;
                    if (sensorType === 'light') currentValue = state.light;
                    if (sensorType === 'temp') currentValue = state.temp;
                    if (sensorType === 'ec') currentValue = state.ec;

                    let condition = false;
                    if (operator === 'lt') condition = currentValue < targetValue;
                    if (operator === 'gt') condition = currentValue > targetValue;
                    if (operator === 'eq') condition = Math.abs(currentValue - targetValue) < 0.1;

                    const thenSlot = block.querySelector('[data-role="then"]');
                    const elseSlot = block.querySelector('[data-role="else"]');
                    executeBlockList(condition ? thenSlot.children : elseSlot.children);
                } else { 
                    applyAction(type); 
                }
            }
        }

        function applyAction(type) {
            switch(type) {
                case 'led_on': state.ledActive = true; break;
                case 'led_off': state.ledActive = false; break;
                case 'add_nutrient': state.ec = Math.min(3.0, state.ec + 0.05); break;
            }
        }

        // --- メインループ ---
        function coreLoop() {
            const now = Date.now();
            const dt = (now - state.lastTick) / 1000;
            state.lastTick = now;

            // 1. 環境の自然変化
            state.temp += (Math.random() - 0.5) * 0.05;
            state.ec = Math.max(0, state.ec - 0.002);
            const ambientLight = 50 + Math.sin(now / 5000) * 20; 
            state.light = state.ledActive ? 400 : ambientLight;

            // 2. プログラムの実行
            if (state.isProgramRunning) {
                const rootBlocks = document.getElementById('workspace').children;
                executeBlockList(rootBlocks);
            }

            // 3. 植物の成長計算
            let growthStep = 0;
            if (state.light > 250) growthStep += 0.05;
            if (state.ec >= 1.0 && state.ec <= 2.2) growthStep += 0.08;
            state.growth += growthStep;

            // 4. 収穫サイクル
            if (state.growth >= 100) {
                addLog("収穫しました！新しい苗を植えます。", "success");
                state.growth = 0;
            }

            render();
            requestAnimationFrame(coreLoop);
        }

        function render() {
            document.getElementById('sensor-temp').innerText = state.temp.toFixed(1);
            document.getElementById('sensor-ec').innerText = state.ec.toFixed(2);
            document.getElementById('sensor-light').innerText = Math.round(state.light);
            document.getElementById('growth-bar').style.width = `${state.growth}%`;

            const ledT = document.getElementById('led-top');
            const ledM = document.getElementById('led-mid');
            if (state.ledActive) {
                ledT.classList.add('led-active');
                ledM.classList.add('led-active');
            } else {
                ledT.classList.remove('led-active');
                ledM.classList.remove('led-active');
            }

            const waterHeight = 10 + Math.sin(Date.now() / 1000) * 2;
            const ecColor = `rgba(56, ${Math.max(100, 255 - state.ec * 50)}, 248, 0.4)`;
            for(let i=1; i<=6; i++) {
                const w = document.getElementById(`water-${i}`);
                if (w) {
                    w.style.height = `${waterHeight}px`;
                    w.style.backgroundColor = ecColor;
                }
                
                const p = document.getElementById(`p${i}`);
                if (p) {
                    const scale = 0.5 + (state.growth / 100);
                    p.style.transform = `scale(${scale})`;
                    if (state.growth > 80) p.innerText = "🥬";
                    else if (state.growth > 30) p.innerText = "🌱";
                    else p.innerText = "🔹";
                }
            }
        }

        // --- UI操作 ---
        function toggleProgram() {
            state.isProgramRunning = !state.isProgramRunning;
            const btn = document.getElementById('btn-run');
            const text = document.getElementById('run-text');
            const icon = document.getElementById('run-icon');
            
            if (state.isProgramRunning) {
                btn.classList.replace('bg-emerald-500', 'bg-rose-500');
                btn.classList.replace('hover:bg-emerald-600', 'hover:bg-rose-600');
                text.innerText = "プログラム停止";
                icon.innerText = "■";
                addLog("制御プログラムを開始しました", "success");
            } else {
                btn.classList.replace('bg-rose-500', 'bg-emerald-500');
                btn.classList.replace('hover:bg-rose-600', 'hover:bg-emerald-600');
                text.innerText = "プログラム実行";
                icon.innerText = "▶";
                addLog("制御プログラムを停止しました（手動モード）", "error");
            }
        }

        function resetSim() {
            state.temp = 22.0;
            state.ec = 1.5;
            state.growth = 0;
            state.ledActive = false;
            addLog("環境をリセットしました");
        }

        window.onload = () => {
            addLog("システムモニタ起動完了");
            coreLoop();
        };
    </script>
</body>
</html>
